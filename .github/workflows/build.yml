name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: |
        if [ -f "gradlew" ]; then
          chmod +x gradlew
        else
          echo "gradlew not found. Run 'gradle wrapper' to generate it."
        fi

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build with Gradle
      # We just build the APK. If gradlew is not checked in, we fallback to global gradle.
      run: |
        if [ -f "gradlew" ]; then
          ./gradlew assembleDebug
        else
          gradle wrapper
          ./gradlew assembleDebug
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: auto-koteka-apk
        path: app/build/outputs/apk/debug/app-debug.apk
